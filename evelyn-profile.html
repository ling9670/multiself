<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#13100D">
  <meta property="og:title" content="Evelyn · multiself">
  <meta property="og:description" content="Massage · Stained Glass · Cat Care · Cannabis Writer · Builder — same person, every version">
  <meta property="og:url" content="https://ling9670.github.io/multiself/evelyn-profile.html">
  <meta property="og:type" content="profile">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Evelyn · multiself">
  <meta name="twitter:description" content="Massage · Stained Glass · Cat Care · Cannabis Writer · Builder — see a person in whole">
  <title>Evelyn · multiself</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #13100D;
      --bg2:         #1A1612;
      --bg3:         #252019;
      --accent:      #D4956A;
      --sand:        #C8B89A;
      --text:        #E8E0D4;
      --text-mid:    #9A8E82;
      --text-dim:    #5C5248;
      --radius:      14px;
      --ease:        cubic-bezier(0.4, 0, 0.2, 1);

      --cannabis:    #7A9E6A;
      --body-c:      #D4956A;
      --service:     #E07A7A;
      --hands:       #C8A0D4;
      --platform:    #7A9E9F;
      --content-c:   #D4C06A;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── LAYOUT ── */
    .app {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100dvh;
    }

    @media (min-width: 800px) {
      .app {
        grid-template-columns: 300px 1fr;
      }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--bg);
      border-bottom: 1px solid rgba(200,184,154,0.07);
      padding: 24px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    @media (min-width: 800px) {
      .sidebar {
        border-bottom: none;
        border-right: 1px solid rgba(200,184,154,0.07);
        height: 100dvh;
        overflow-y: auto;
        padding: 36px 24px;
        display: flex;
        flex-direction: column;
      }
      .sidebar::-webkit-scrollbar { display: none; }
    }

    /* ── PROFILE TOP ── */
    .profile-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--accent) 0%, #7A5030 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      color: var(--bg);
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .profile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--text);
    }

    .profile-location {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .profile-bio {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      color: var(--text-mid);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    @media (min-width: 800px) {
      .profile-top { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
      .profile-bio { margin-bottom: 28px; }
    }

    /* ── PILLS / IDENTITY LIST ── */
    .pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 16px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .pills::-webkit-scrollbar { display: none; }

    @media (min-width: 800px) {
      .pills {
        flex-direction: column;
        overflow-x: visible;
        overflow-y: auto;
        padding-bottom: 0;
        gap: 3px;
        flex: 1;
      }
    }

    .pill {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s var(--ease), color 0.2s var(--ease);
      background: var(--bg3);
      color: var(--text-mid);
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .pill:hover:not(.active) {
      color: var(--text);
    }

    .pill.active {
      color: var(--bg);
      font-weight: 700;
    }

    @media (min-width: 800px) {
      .pill {
        border-radius: 10px;
        padding: 10px 14px;
        text-align: left;
      }
    }

    /* ── MAIN CONTENT ── */
    .main {
      position: relative;
    }

    /* ── IDENTITY CARD ── */
    .card {
      display: none;
      padding: 28px 20px 48px;
      animation: rise 0.3s var(--ease);
    }

    @media (min-width: 800px) {
      .card { padding: 48px 52px; }
    }

    .card.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Hero banner */
    .card-hero {
      width: 100%;
      aspect-ratio: 21/9;
      border-radius: var(--radius);
      margin-bottom: 28px;
      display: flex;
      align-items: flex-end;
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
    }

    .card-hero-bg {
      position: absolute;
      inset: 0;
      opacity: 1;
    }

    .card-cluster {
      position: relative;
      z-index: 1;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
      color: var(--bg);
    }

    /* Text */
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 6vw, 44px);
      font-weight: 400;
      line-height: 1.08;
      color: var(--text);
      margin-bottom: 8px;
    }

    .card-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 3vw, 20px);
      font-weight: 300;
      font-style: italic;
      color: var(--accent);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .card-description {
      font-size: 14px;
      line-height: 1.85;
      color: var(--text-mid);
      margin-bottom: 28px;
      max-width: 560px;
    }

    /* Links */
    .card-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 22px;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
      border: 1px solid transparent;
    }
    .btn:hover { opacity: 0.82; }

    .btn-primary {
      color: var(--bg);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-mid);
    }

    /* ── SWIPE NAV ── */
    .swipe-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 32px;
    }

    @media (min-width: 800px) { .swipe-nav { display: none; } }

    .nav-arrow {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg3);
      border: none;
      color: var(--text-mid);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .nav-arrow:hover { background: var(--bg2); color: var(--text); }
    .nav-arrow:disabled { opacity: 0.2; cursor: default; }

    /* Dots */
    .dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--bg3);
      transition: all 0.3s var(--ease);
      cursor: pointer;
    }

    .dot.active {
      width: 22px;
      border-radius: 100px;
    }

    /* ── FOOTER ── */
    .profile-footer {
      text-align: center;
      padding: 16px 20px 32px;
      border-top: 1px solid rgba(200,184,154,0.06);
    }

    @media (min-width: 800px) { .profile-footer { display: none; } }

    .footer-text {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── SIDEBAR FOOTER (desktop) ── */
    .sidebar-footer {
      display: none;
      padding-top: 24px;
      border-top: 1px solid rgba(200,184,154,0.07);
      margin-top: 16px;
    }

    @media (min-width: 800px) { .sidebar-footer { display: block; } }

    .sidebar-footer p {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .sidebar-footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>

    desc: 'Not a facial. Not skincare. She translates ancient pressure-point systems into language you can feel — not "this point corresponds to the liver meridian" but "press here and you\'ll feel a line from cheekbone to neck. That line is where your stress lives." Camera facing her own face. Invitation, not lecture.',
    links: [
      { label: 'Watch video', href: '#', primary: true },

    ]
  },
  {
    pill: 'Liminal Lumière',
    cluster: 'Hands',
    color: '#C8A0D4',
    title: 'Liminal Lumière',
    tagline: '光在玻璃裡不是被困住，是被轉化',
    desc: 'Stained glass for the home, not the church. Pet Memory Box: a custom piece for each animal — their colours, their light. When the candle lights, the wall shows that animal\'s tones. Not memory. Presence. Working toward a gallery exhibition.',
    links: [
      { label: 'Etsy shop', href: '#', primary: true },

    ]
  },
  {
    pill: 'Sewing',
    cluster: 'Hands',
    color: '#C8A0D4',
    title: '用手思考',
    tagline: 'Thinking happens in the hands',
    desc: '由細到大我都知我嘅天賦比較用手。Not skilled hands — thinking hands. She uses the movement of her hands to discover what she\'s thinking. The resistance of the needle through fabric tells her the density of the cloth. She\'s not executing a plan. She\'s having a conversation with material.',
    links: [

    tagline: '繩子告訴我它想去哪裡',
    desc: 'The rope has its own logic. Work with it long enough and it starts leading. Learning to follow instead of control — that\'s the whole practice, and it has nothing to do with macramé.',

    desc: 'Not a stoner. Not a wellness influencer. Someone who can describe what actually happens in her brain — "腦袋打了支針咁爽快，但有啲薄，稀稀地" — and make you recognise yourself in the description. The lavender detail. The 3pm reset. The language that was missing before she wrote it.',

    desc: 'Resume is out in this generation. The platform that shows all of you — not your best angle, not your most marketable version. Same you, every version. The more ways people can find you, the more ways you can connect. This profile you\'re reading is the demo.',

  {

    desc: 'Not film criticism. A framework: what if Stephen Chow\'s characters are the same souls across different lifetimes? 至尊寶 × 韋小寶 — who owes whom a debt across reincarnations? The question that makes every Chow film feel like a different chapter of the same story.',

  {

    cluster: 'Platform',

    title: '我喜歡建造，不喜歡管理',

let current = 0;

function buildBg(color) {
  return `background: radial-gradient(ellipse at 30% 50%, ${color}28 0%, ${color}08 60%, transparent 100%), linear-gradient(135deg, ${color}15 0%, #13100D 100%);`;
}

function render() {
  const pills = document.getElementById('pills');
  const stage = document.getElementById('stage');
  const dots = document.getElementById('dots');

  pills.innerHTML = nodes.map((n, i) => `
    <div class="pill${i === 0 ? ' active' : ''}"
         style="${i === 0 ? `background:${n.color};color:#13100D;` : ''}"
         onclick="go(${i})">${n.pill}</div>
  `).join('');

  stage.innerHTML = nodes.map((n, i) => `
    <div class="card${i === 0 ? ' active' : ''}" id="card-${i}">
      <div class="card-hero" style="${buildBg(n.color)}">
        <span class="card-cluster" style="background:${n.color}; color:#13100D;">${n.cluster}</span>
      </div>
      <div class="card-title">${n.title}</div>
      <div class="card-tagline">${n.tagline}</div>
      <div class="card-description">${n.desc}</div>
      <div class="card-links">
        ${n.links.map(l => `
          <a href="${l.href}" class="btn ${l.primary ? 'btn-primary' : 'btn-ghost'}"
             style="${l.primary
               ? `background:${n.color};border-color:${n.color};`
               : `border-color:${n.color}55;color:${n.color};`}">
            ${l.label}${l.primary ? ' ↗' : ''}
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');

  dots.innerHTML = nodes.map((n, i) => `
    <div class="dot${i === 0 ? ' active' : ''}"
         style="${i === 0 ? `background:${nodes[0].color};width:22px;border-radius:100px;` : ''}"
         onclick="go(${i})"></div>
  `).join('');
}

function go(i) {
  if (i < 0 || i >= nodes.length) return;

  document.querySelectorAll('.card').forEach((el, idx) => el.classList.toggle('active', idx === i));

  document.querySelectorAll('.pill').forEach((el, idx) => {
    const n = nodes[idx];
    if (idx === i) {
      el.classList.add('active');
      el.style.background = n.color;
      el.style.color = '#13100D';
    } else {
      el.classList.remove('active');
      el.style.background = '';
      el.style.color = '';
    }
  });

  document.querySelectorAll('.dot').forEach((el, idx) => {
    if (idx === i) {
      el.classList.add('active');
      el.style.background = nodes[i].color;
      el.style.width = '22px';
      el.style.borderRadius = '100px';
    } else {
      el.classList.remove('active');
      el.style.background = '';
      el.style.width = '';
      el.style.borderRadius = '';
    }
  });

  const activePill = document.querySelectorAll('.pill')[i];
  if (activePill) activePill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  document.getElementById('prev').disabled = i === 0;
  document.getElementById('next').disabled = i === nodes.length - 1;

  current = i;
}

/* Touch swipe */
let startX = 0;
const stage = document.getElementById('stage');
stage.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
stage.addEventListener('touchend', e => {
  const diff = startX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 48) go(diff > 0 ? current + 1 : current - 1);
}, { passive: true });

/* Keyboard */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(current + 1);
  if (e.key === 'ArrowLeft') go(current - 1);
});

render();
document.getElementById('prev').disabled = true;
</script>
